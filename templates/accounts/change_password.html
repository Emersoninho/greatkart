{% extends 'base.html' %}

{% block content %}

<section class="py-10 bg-gray-50 min-h-screen">

    {% include 'includes/alerts.html' %}
    
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex flex-col md:flex-row gap-6 items-start">
            
            {% include 'includes/dashboard_sidebar.html' %}
            
            <main class="flex-1 w-full">
                <article class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    
                    <header class="border-b border-gray-200 bg-gray-50/50 px-6 py-4">
                        <h3 class="text-lg font-bold text-gray-900">Alterar Sua Senha</h3>
                    </header>
                    
                    <div class="p-6">
                        <div class="max-w-xl">
                            <form action="{% url 'change_password' %}" method="POST" class="space-y-5">
                                {% csrf_token %}

                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-medium text-gray-700">Senha Atual</label>
                                    <input type="password" 
                                           name="current_password" 
                                           placeholder="Digite sua senha atual" 
                                           class="w-full bg-white border border-gray-300 text-sm text-gray-900 rounded-lg px-4 py-2.5 outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all" 
                                           required>
                                </div>
                                
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-medium text-gray-700">Criar Nova Senha</label>
                                    <input type="password" 
                                           name="new_password" 
                                           placeholder="Digite a nova senha" 
                                           class="w-full bg-white border border-gray-300 text-sm text-gray-900 rounded-lg px-4 py-2.5 outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all" 
                                           required>
                                </div>
                                
                                <div class="flex flex-col gap-1.5">
                                    <label class="text-sm font-medium text-gray-700">Confirmar Nova Senha</label>
                                    <input type="password" 
                                           name="confirm_password" 
                                           placeholder="Confirme a nova senha" 
                                           class="w-full bg-white border border-gray-300 text-sm text-gray-900 rounded-lg px-4 py-2.5 outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all" 
                                           required>
                                </div>

                                <div class="pt-2">
                                    <button type="submit" class="inline-flex items-center justify-center px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-sm hover:shadow transition-all duration-200 cursor-pointer">
                                        Salvar Alterações
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div> </article> </main>
            
        </div> </div>

</section>

{% endblock %}
