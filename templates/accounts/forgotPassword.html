{% extends 'base.html' %}

{% block content %}
<section class="min-h-[80vh] flex flex-col justify-center items-center px-4 py-12 bg-gray-50">
    
    <div class="w-full max-w-md">
        <div class="mb-4">
            {% include 'includes/alerts.html' %}
        </div>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden p-8">
            <header class="mb-6 text-center">
                <h4 class="text-2xl font-bold text-gray-900 tracking-tight">Esqueceu a Senha?</h4>
                <p class="text-sm text-gray-500 mt-1">Insira seu e-mail cadastrado para redefinir sua senha.</p>
            </header>

            <form action="{% url 'forgotPassword' %}" method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">Endereço de E-mail</label>
                    <input type="email" 
                           class="w-full bg-white border border-gray-300 text-sm text-gray-900 rounded-lg px-4 py-2.5 outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all" 
                           placeholder="exemplo@email.com" 
                           name="email" 
                           required>
                </div>

                <div class="flex justify-end text-sm">
                    <a href="{% url 'login' %}" class="text-primary-600 hover:text-primary-700 font-medium hover:underline transition-colors">
                        Lembrou a senha? Entrar
                    </a>
                </div>

                <div>
                    <button type="submit" class="w-full flex items-center justify-center px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-sm hover:shadow transition-all duration-200 cursor-pointer">
                        Recuperar Senha
                    </button>
                </div>
            </form>
        </div> <p class="text-center text-sm text-gray-600 mt-6">
            Não tem uma conta? 
            <a href="{% url 'register' %}" class="text-primary-600 hover:text-primary-700 font-semibold hover:underline transition-colors">
                Cadastre-se
            </a>
        </p>
    </div>

</section>
{% endblock %}
